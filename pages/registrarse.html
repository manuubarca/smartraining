<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
    <title>Document</title>
</head>
<body class="bg-black">
  <main class="container-fluid mb-5 text-start">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center ">
        <div class="col-12">
          <div class="card">
            <div class="card-body p-0">
              <div class="row g-0">
                <form id="formSocio" class="p-5">
                  <h3 class="fw-normal mb-5 fw-bold">
                    Información personal
                  </h3>
                  <div class="row">
                    <div class="col-md-4 mb-4 pb-2">
                      <input type="text" placeholder="Nombre" name="nombre" id="idNombre" class="form-control" />
                    </div>
                    <div class="col-md-4 mb-4 pb-2">
                      <input type="text" placeholder="Apellido" name="apellido" id="idApellido" class="form-control" />
                    </div>
                    <div class="col-md-4 mb-4 pb-2">
                      <input type="file" id="img" name="img" accept="image/*">
                    </div>
                  </div>
                  <div class="mb-4 pb-2">
                    <input type="date" placeholder="Fecha de nacimiento" name="fechaDeNacimiento" id="idFechaDeNacimiento" class="form-control" />
                  </div>
                  <div class="row mb-4 pb-2">
                    <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">
                      <input type="text" placeholder="Ciudad" name="ciudad" id="idCiudad" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <input type="text" placeholder="Dirección" name="ciudad" id="idDireccion" class="form-control" />
                    </div>
                  </div>
                  <div class="row mb-4 pb-2">
                    <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">
                      <input type="email" placeholder="Email" name="email" class="form-control" id="idEmail">
                    </div>
                    <div class="col-md-6">
                      <input type="password" placeholder="Contraseña" name="contrasenia" class="form-control" id="idContrasenia">
                    </div>
                  </div>
                  <div class="mb-4 pb-2">
                    <input type="number" placeholder="Número de celular" name="numeroDeCelular" id="idNumeroDeCelular" class="form-control" />
                  </div>
                  <div class="row">
                    <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">
                      <input type="text" placeholder="Prestador de salud" name="prestadorDeSalud" id="idPrestadorDeSalud" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <input type="text" placeholder="Carné de salud" name="carneDeSalud" id="idCarneDeSalud" class="form-control" />
                    </div>
                  </div>
                  <div class="d-flex justify-content-start align-content-center mt-4 pt-4">
                    <button id="botonEnviarFormularioNuevoSocio" class="btn w-auto bg-red text-white form-control">
                      Registrarme
                    </button>
                  </div>
                </form>
                <br>
                <br>
                <div class="row" id="divSocios">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  <script src="../js/arrays.js"></script>
  <script src="../js/dom.js"></script>
  <script src="../js/funciones.js"></script>
  <script src="../js/objetos.js"></script>
</body>
</html>
