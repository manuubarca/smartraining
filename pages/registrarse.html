<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
    <title>Document</title>
</head>
<body class="bg-black">
    <main class="container-fluid mb-5 text-center">
        <div class="container d-flex flex-column">
            <section class="h-100 h-custom gradient-custom-2">
                <div class="container py-5 h-100">
                  <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12">
                      <div class="card card-registration card-registration-2">
                        <div class="card-body p-0">
                          <div class="row g-0">
                            <div class="col-lg-6">
                              <div class="p-5">
                                <h3 class="fw-normal mb-5 fw-bold">Información personal</h3>

                                <div class="row">
                                  <div class="col-md-6 mb-4 pb-2">
              
                                    <div class="form-outline">
                                        <label class="form-label" for="form3Examplev2">Nombre</label>
                                        <input type="text" id="form3Examplev2" class="form-control form-control-lg" />
                                    </div>
              
                                  </div>
                                  <div class="col-md-6 mb-4 pb-2">
              
                                    <div class="form-outline">
                                        <label class="form-label" for="form3Examplev3">Apellido</label>
                                        <input type="text" id="form3Examplev3" class="form-control form-control-lg" />
                                    </div>
              
                                  </div>
                                </div>
              
                                <div class="mb-4 pb-2">
                                  <div class="form-outline">
                                    <label class="form-label" for="form3Examplev4">Fecha de nacimiento</label>
                                    <input type="date" id="form3Examplev4" class="form-control form-control-lg" />
                                  </div>
                                </div>
              
                                <div class="row mb-4 pb-2">
                                  <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">
              
                                    <div class="form-outline">
                                        <label class="form-label" for="form3Examplev5">Ciudad</label>
                                        <input type="text" id="form3Examplev5" class="form-control form-control-lg" />
                                    </div>
              
                                  </div>
                                  <div class="col-md-6">
                                        <div class="form-outline form-white">
                                            <label class="form-label" for="form3Examplea6">Dirección</label>
                                            <input type="text" id="form3Examplea6" class="form-control form-control-lg" />
                                        </div>
                                  </div>
                                </div>

                                <div class="row mb-4 pb-2">
                                    <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">

                                        <div class="form-outline">
                                            <label for="exampleInputEmail1" class="form-label">Correo electrónico</label>
                                            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                                          </div>

                                    </div>

                                    <div class="col-md-6">
                                        <div class="form-outline">
                                            <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                                            <input type="password" class="form-control" id="exampleInputPassword1">
                                          </div>

                                    </div>
                                </div>

                                <div class="mb-4 pb-2">
                                    <div class="form-outline form-white">
                                        <label class="form-label" for="form3Examplea6">Número de teléfono</label>
                                        <input type="text" id="form3Examplea6" class="form-control form-control-lg" />
                                      </div>
                                  </div>

                                  
                                <div class="row">
                                    <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">
                
                                      <div class="form-outline">
                                        <label class="form-label" for="form3Examplev5">Prestador de salud</label>
                                        <input type="text" id="form3Examplev5" class="form-control form-control-lg" />
                                      </div>
                
                                    </div>
                                    <div class="col-md-6">
                                          <div class="form-outline form-white">
                                            <label class="form-label" for="form3Examplea6">Carné de salud</label>
                                            <input type="text" id="form3Examplea6" class="form-control form-control-lg" />
                                          </div>
                                    </div>
                                </div>
              
                              </div>
                            </div>
                            <div class="col-lg-6 bg-gray">
                              <div class="p-5">
                                <h3 class="fw-normal mb-5 fw-bold">Información de socio</h3>
              
                                <div class="mb-4 pb-2">
                                  <div class="form-outline form-white">
                                    <label class="form-label" for="form3Examplea2">Nombre de Plan</label>
                                    <input type="text" id="form3Examplea2" class="form-control form-control-lg" />
                                  </div>
                                </div>
              
                                <div class="mb-4 pb-2">
                                  <div class="form-outline form-white">
                                    <label class="form-label" for="form3Examplea3">Cantidad de días</label>
                                    <input type="text" id="form3Examplea3" class="form-control form-control-lg" />
                                  </div>
                                </div>
              
                                <div class="row">
                                  <div class="col-md-5 mb-4 pb-2">
              
                                    <div class="form-outline form-white">
                                        <label class="form-label" for="form3Examplea4">Días disponibles para reservar</label>
                                        <input type="text" id="form3Examplea4" class="form-control form-control-lg" />
                                    </div>
              
                                  </div>
                                  <div class="col-md-7 mb-4 pb-2">
              
                                    <div class="form-outline form-white">
                                        <label class="form-label" for="form3Examplea5">Días para el vencimiento</label>
                                        <input type="text" id="form3Examplea5" class="form-control form-control-lg" />
                                    </div>
              
                                  </div>
                                </div>
              
                                <div class="form-check d-flex justify-content-start mb-4 pb-3">
                                  <input
                                    class="form-check-input me-3"
                                    type="checkbox"
                                    value=""
                                    id="form2Example3c"
                                  />
                                  <label class="form-check-label" for="form2Example3">
                                    Acepto <a href="#!" class="red"><u>Terminos y condiciones</u></a> del sitio.
                                  </label>
                                </div>
              
                                <a href="./inicio.html"><button type="submit" class="btn bg-red text-white btn-lg" data-mdb-ripple-color="dark">Registrarme</button></a>

                                <div class="mt-5 text-end">
                                    <a href="../index.html" class="text-muted">Volver a página principal</a>
                                </div>
              
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </section>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
